services:
  - type: web
    name: creci-pr-scire-auditoria
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_DATA_DIR
        value: /var/data/creci-pr-scire
      - key: APP_COOKIE_SAMESITE
        value: lax
    disk:
      name: creci-pr-scire-data
      mountPath: /var/data
      sizeGB: 1